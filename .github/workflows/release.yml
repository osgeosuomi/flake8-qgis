name: Release & publish
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and publish release
    runs-on: ubuntu-latest
    environment:
      name: pypi-release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
